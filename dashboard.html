<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c49a3c;
    --bg: #f5f4f0;
    --white: #fff;
    --dark: #1a1a1a;
    --gray: #888;
    --border: #e5e4e0;
    --red: #e74c3c;
    --yellow: #f39c12;
    --green: #27ae60;
    --blue: #2980b9;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; color: var(--dark); }

  /* NAV */
  nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-brand span.tag { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--gold); text-transform: uppercase; }
  .nav-brand span.title { font-family: 'DM Serif Display', serif; font-size: 18px; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--gray);
    transition: all 0.15s;
  }
  .nav-tab.active { background: var(--dark); color: var(--white); }
  .nav-tab:hover:not(.active) { background: var(--bg); color: var(--dark); }
  .btn-logout { font-size: 13px; color: var(--gray); background: none; border: none; cursor: pointer; padding: 6px 10px; border-radius: 8px; }
  .btn-logout:hover { background: var(--bg); }

  /* LAYOUT */
  main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 2rem; }
  .stat-card {
    background: var(--white);
    border-radius: 12px;
    padding: 1.25rem;
    border: 1px solid var(--border);
  }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--dark); }
  .stat-sub { font-size: 12px; color: var(--gray); margin-top: 4px; }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-size: 15px; font-weight: 600; }

  /* BTN */
  .btn-primary {
    background: var(--dark);
    color: var(--white);
    border: none;
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #333; }

  /* CLIENTS GRID */
  .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .client-card {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 1.25rem;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .client-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .client-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .client-avatar {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--dark); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; flex-shrink: 0;
  }
  .client-name { font-size: 14px; font-weight: 600; }
  .client-rfc { font-size: 12px; color: var(--gray); }
  .client-regime { font-size: 12px; color: var(--gray); margin-bottom: 10px; }
  .obligations-list { display: flex; flex-direction: column; gap: 6px; }
  .obligation-item {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; padding: 6px 10px;
    background: var(--bg); border-radius: 8px;
  }
  .obligation-name { color: var(--dark); }
  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 50px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .badge-red { background: #fde8e8; color: var(--red); }
  .badge-yellow { background: #fef3e2; color: var(--yellow); }
  .badge-green { background: #e8f8ef; color: var(--green); }
  .badge-blue { background: #e3f0fb; color: var(--blue); }

  /* CALENDAR */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 1.5rem; }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .cal-day-name { font-size: 11px; font-weight: 600; color: var(--gray); text-align: center; text-transform: uppercase; }
  .cal-cell {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; min-height: 80px; padding: 8px;
    font-size: 12px;
  }
  .cal-cell.today { border-color: var(--gold); }
  .cal-cell.empty { background: transparent; border-color: transparent; }
  .cal-num { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--dark); }
  .cal-num.today-num { color: var(--gold); }
  .cal-event {
    font-size: 10px; padding: 2px 5px; border-radius: 4px;
    margin-bottom: 2px; line-height: 1.4; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* PENDIENTES LIST */
  .pending-list { display: flex; flex-direction: column; gap: 10px; }
  .pending-item {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: 14px;
  }
  .pending-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pending-info { flex: 1; }
  .pending-title { font-size: 14px; font-weight: 500; }
  .pending-client { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .pending-date { font-size: 12px; font-weight: 600; color: var(--gray); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 200;
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 16px;
    padding: 2rem; width: 100%; max-width: 500px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 1.5rem; }
  .form-field { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: #fafaf8; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-select { appearance: none; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; justify-content: flex-end; }
  .btn-secondary {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--dark); border-radius: 50px;
    padding: 8px 18px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }

  .cal-nav { display: flex; align-items: center; gap: 12px; }
  .cal-nav button { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 14px; }
  .cal-month { font-size: 15px; font-weight: 600; min-width: 140px; text-align: center; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <span class="tag">Gestión</span>
    <span class="title">Panel Fiscal</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('clientes')">Clientes</button>
    <button class="nav-tab" onclick="switchView('calendario')">Calendario</button>
    <button class="nav-tab" onclick="switchView('pendientes')">Pendientes</button>
  </div>
  <div class="nav-right">
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>

<main>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Clientes</div>
      <div class="stat-value" id="stat-clientes">0</div>
      <div class="stat-sub">registrados</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vencidas</div>
      <div class="stat-value" id="stat-vencidas" style="color:var(--red)">0</div>
      <div class="stat-sub">obligaciones</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Esta semana</div>
      <div class="stat-value" id="stat-semana" style="color:var(--yellow)">0</div>
      <div class="stat-sub">por vencer</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Al corriente</div>
      <div class="stat-value" id="stat-corriente" style="color:var(--green)">0</div>
      <div class="stat-sub">obligaciones</div>
    </div>
  </div>

  <!-- VIEW: CLIENTES -->
  <div class="view active" id="view-clientes">
    <div class="section-header">
      <span class="section-title">Mis clientes</span>
      <button class="btn-primary" onclick="abrirModalCliente()">+ Agregar cliente</button>
    </div>
    <div class="clients-grid" id="clients-grid">
      <p style="color:var(--gray); font-size:14px;">Cargando...</p>
    </div>
  </div>

  <!-- VIEW: CALENDARIO -->
  <div class="view" id="view-calendario">
    <div class="section-header">
      <span class="section-title">Calendario de obligaciones</span>
      <div class="cal-nav">
        <button onclick="cambiarMes(-1)">←</button>
        <span class="cal-month" id="cal-month-label"></span>
        <button onclick="cambiarMes(1)">→</button>
      </div>
    </div>
    <div class="cal-header">
      <div class="cal-day-name">Lun</div>
      <div class="cal-day-name">Mar</div>
      <div class="cal-day-name">Mié</div>
      <div class="cal-day-name">Jue</div>
      <div class="cal-day-name">Vie</div>
      <div class="cal-day-name">Sáb</div>
      <div class="cal-day-name">Dom</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- VIEW: PENDIENTES -->
  <div class="view" id="view-pendientes">
    <div class="section-header">
      <span class="section-title">Obligaciones pendientes</span>
    </div>
    <div class="pending-list" id="pending-list"></div>
  </div>

</main>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <p class="modal-title" id="modal-cliente-title">Nuevo cliente</p>
    <div class="form-field">
      <label class="form-label">Nombre / Razón social</label>
      <input class="form-input" id="f-nombre" type="text" placeholder="Ej. María López Hernández" />
    </div>
    <div class="form-field">
      <label class="form-label">RFC</label>
      <input class="form-input" id="f-rfc" type="text" placeholder="Ej. LOHE850101ABC" style="text-transform:uppercase" />
    </div>
    <div class="form-field">
      <label class="form-label">Régimen fiscal</label>
      <select class="form-input form-select" id="f-regimen">
        <option value="">Seleccionar...</option>
        <option>Régimen Simplificado de Confianza (RESICO)</option>
        <option>Régimen de Actividades Empresariales</option>
        <option>Sueldos y Salarios</option>
        <option>Arrendamiento</option>
        <option>Persona Moral — Régimen General</option>
        <option>Incorporación Fiscal (RIF)</option>
        <option>Plataformas Tecnológicas</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label">Correo de contacto</label>
      <input class="form-input" id="f-correo" type="email" placeholder="correo@ejemplo.com" />
    </div>
    <div class="form-field">
      <label class="form-label">Teléfono</label>
      <input class="form-input" id="f-telefono" type="tel" placeholder="833 000 0000" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarModal('modal-cliente')">Cancelar</button>
      <button class="btn-primary" onclick="guardarCliente()">Guardar cliente</button>
    </div>
  </div>
</div>

<!-- MODAL OBLIGACION -->
<div class="modal-overlay" id="modal-obligacion">
  <div class="modal">
    <p class="modal-title">Nueva obligación</p>
    <input type="hidden" id="f-ob-cliente-id" />
    <div class="form-field">
      <label class="form-label">Obligación</label>
      <select class="form-input form-select" id="f-ob-nombre">
        <option>Declaración mensual ISR</option>
        <option>Declaración mensual IVA</option>
        <option>Declaración anual ISR</option>
        <option>DIOT</option>
        <option>Nómina IMSS</option>
        <option>Declaración informativa</option>
        <option>Otra</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label">Fecha de vencimiento</label>
      <input class="form-input" id="f-ob-fecha" type="date" />
    </div>
    <div class="form-field">
      <label class="form-label">Estatus</label>
      <select class="form-input form-select" id="f-ob-estatus">
        <option value="pendiente">Pendiente</option>
        <option value="en_proceso">En proceso</option>
        <option value="entregado">Entregado</option>
        <option value="vencido">Vencido</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label">Notas</label>
      <input class="form-input" id="f-ob-notas" type="text" placeholder="Opcional" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarModal('modal-obligacion')">Cancelar</button>
      <button class="btn-primary" onclick="guardarObligacion()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vvqizkqmkmcmdsporwjs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2cWl6a3Fta21jbWRzcG9yd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNDE4MzcsImV4cCI6MjA5NTkxNzgzN30.2v9qNTda9XnuN7McX38B15TdwQa0vbA_qPGopj0iwZc';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let clientes = [];
let obligaciones = [];
let calDate = new Date();
let editingClienteId = null;

// AUTH CHECK
async function checkAuth() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) window.location.href = 'login.html';
}

async function logout() {
  await db.auth.signOut();
  window.location.href = 'login.html';
}

// VIEWS
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  event.target.classList.add('active');
  if (view === 'calendario') renderCalendario();
  if (view === 'pendientes') renderPendientes();
}

// STATS
function updateStats() {
  const hoy = new Date();
  const semana = new Date(); semana.setDate(hoy.getDate() + 7);
  const vencidas = obligaciones.filter(o => o.estatus !== 'entregado' && new Date(o.fecha_vencimiento) < hoy).length;
  const estaSemana = obligaciones.filter(o => {
    const f = new Date(o.fecha_vencimiento);
    return o.estatus !== 'entregado' && f >= hoy && f <= semana;
  }).length;
  const corriente = obligaciones.filter(o => o.estatus === 'entregado').length;
  document.getElementById('stat-clientes').textContent = clientes.length;
  document.getElementById('stat-vencidas').textContent = vencidas;
  document.getElementById('stat-semana').textContent = estaSemana;
  document.getElementById('stat-corriente').textContent = corriente;
}

// LOAD DATA
async function loadData() {
  const { data: c } = await db.from('clientes').select('*').order('nombre');
  const { data: o } = await db.from('obligaciones').select('*').order('fecha_vencimiento');
  clientes = c || [];
  obligaciones = o || [];
  renderClientes();
  updateStats();
}

// CLIENTES
function renderClientes() {
  const grid = document.getElementById('clients-grid');
  if (!clientes.length) {
    grid.innerHTML = '<p style="color:var(--gray);font-size:14px;">Sin clientes aún. Agrega el primero.</p>';
    return;
  }
  grid.innerHTML = clientes.map(c => {
    const obs = obligaciones.filter(o => o.cliente_id === c.id);
    const hoy = new Date();
    const obsHtml = obs.slice(0,3).map(o => {
      const f = new Date(o.fecha_vencimiento);
      let badge, label;
      if (o.estatus === 'entregado') { badge = 'badge-green'; label = 'Entregado'; }
      else if (f < hoy) { badge = 'badge-red'; label = 'Vencido'; }
      else if ((f - hoy) / 86400000 <= 7) { badge = 'badge-yellow'; label = 'Próximo'; }
      else { badge = 'badge-blue'; label = 'Vigente'; }
      return `<div class="obligation-item">
        <span class="obligation-name">${o.nombre}</span>
        <span class="badge ${badge}">${label}</span>
      </div>`;
    }).join('');
    const inicial = c.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<div class="client-card" onclick="abrirCliente('${c.id}')">
      <div class="client-header">
        <div class="client-avatar">${inicial}</div>
        <div>
          <div class="client-name">${c.nombre}</div>
          <div class="client-rfc">${c.rfc || '—'}</div>
        </div>
      </div>
      <div class="client-regime">${c.regimen || ''}</div>
      <div class="obligations-list">${obsHtml || '<span style="font-size:12px;color:var(--gray)">Sin obligaciones</span>'}</div>
    </div>`;
  }).join('');
}

function abrirCliente(id) {
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  document.getElementById('f-ob-cliente-id').value = id;
  // Para simplicity abrimos modal de obligación
  abrirModalObligacion(id);
}

// MODAL CLIENTE
function abrirModalCliente(id = null) {
  editingClienteId = id;
  const c = id ? clientes.find(x => x.id === id) : null;
  document.getElementById('modal-cliente-title').textContent = c ? 'Editar cliente' : 'Nuevo cliente';
  document.getElementById('f-nombre').value = c?.nombre || '';
  document.getElementById('f-rfc').value = c?.rfc || '';
  document.getElementById('f-regimen').value = c?.regimen || '';
  document.getElementById('f-correo').value = c?.correo || '';
  document.getElementById('f-telefono').value = c?.telefono || '';
  document.getElementById('modal-cliente').classList.add('open');
}

async function guardarCliente() {
  const data = {
    nombre: document.getElementById('f-nombre').value.trim(),
    rfc: document.getElementById('f-rfc').value.trim().toUpperCase(),
    regimen: document.getElementById('f-regimen').value,
    correo: document.getElementById('f-correo').value.trim(),
    telefono: document.getElementById('f-telefono').value.trim(),
  };
  if (!data.nombre) { alert('El nombre es obligatorio.'); return; }
  if (editingClienteId) {
    await db.from('clientes').update(data).eq('id', editingClienteId);
  } else {
    await db.from('clientes').insert(data);
  }
  cerrarModal('modal-cliente');
  await loadData();
}

// MODAL OBLIGACION
function abrirModalObligacion(clienteId) {
  document.getElementById('f-ob-cliente-id').value = clienteId;
  document.getElementById('f-ob-fecha').value = '';
  document.getElementById('f-ob-notas').value = '';
  document.getElementById('modal-obligacion').classList.add('open');
}

async function guardarObligacion() {
  const data = {
    cliente_id: document.getElementById('f-ob-cliente-id').value,
    nombre: document.getElementById('f-ob-nombre').value,
    fecha_vencimiento: document.getElementById('f-ob-fecha').value,
    estatus: document.getElementById('f-ob-estatus').value,
    notas: document.getElementById('f-ob-notas').value,
  };
  if (!data.fecha_vencimiento) { alert('La fecha es obligatoria.'); return; }
  await db.from('obligaciones').insert(data);
  cerrarModal('modal-obligacion');
  await loadData();
}

function cerrarModal(id) {
  document.getElementById(id).classList.remove('open');
}

// CALENDARIO
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function cambiarMes(dir) {
  calDate.setMonth(calDate.getMonth() + dir);
  renderCalendario();
}

function renderCalendario() {
  const hoy = new Date();
  const año = calDate.getFullYear();
  const mes = calDate.getMonth();
  document.getElementById('cal-month-label').textContent = `${MESES[mes]} ${año}`;

  const primerDia = new Date(año, mes, 1);
  let startDow = primerDia.getDay(); // 0=dom
  startDow = startDow === 0 ? 6 : startDow - 1; // convertir a lun=0

  const diasMes = new Date(año, mes + 1, 0).getDate();
  const grid = document.getElementById('cal-grid');
  let html = '';

  for (let i = 0; i < startDow; i++) html += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= diasMes; d++) {
    const esHoy = hoy.getDate() === d && hoy.getMonth() === mes && hoy.getFullYear() === año;
    const fechaStr = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const obs = obligaciones.filter(o => o.fecha_vencimiento === fechaStr);

    const eventsHtml = obs.map(o => {
      const c = clientes.find(x => x.id === o.cliente_id);
      let color = '#e3f0fb'; let text = '#2980b9';
      if (o.estatus === 'entregado') { color='#e8f8ef'; text='#27ae60'; }
      else if (o.estatus === 'vencido') { color='#fde8e8'; text='#e74c3c'; }
      else if (o.estatus === 'en_proceso') { color='#fef3e2'; text='#f39c12'; }
      return `<div class="cal-event" style="background:${color};color:${text}" title="${c?.nombre}: ${o.nombre}">${c?.nombre?.split(' ')[0] || '?'}: ${o.nombre}</div>`;
    }).join('');

    html += `<div class="cal-cell${esHoy?' today':''}">
      <div class="cal-num${esHoy?' today-num':''}">${d}</div>
      ${eventsHtml}
    </div>`;
  }
  grid.innerHTML = html;
}

// PENDIENTES
function renderPendientes() {
  const hoy = new Date();
  const lista = obligaciones
    .filter(o => o.estatus !== 'entregado')
    .sort((a,b) => new Date(a.fecha_vencimiento) - new Date(b.fecha_vencimiento));

  if (!lista.length) {
    document.getElementById('pending-list').innerHTML = '<p style="color:var(--gray);font-size:14px;">Sin pendientes. ¡Todo al corriente!</p>';
    return;
  }

  document.getElementById('pending-list').innerHTML = lista.map(o => {
    const c = clientes.find(x => x.id === o.cliente_id);
    const f = new Date(o.fecha_vencimiento);
    let color = '#2980b9';
    if (o.estatus === 'vencido' || f < hoy) color = '#e74c3c';
    else if ((f - hoy) / 86400000 <= 7) color = '#f39c12';
    const dias = Math.ceil((f - hoy) / 86400000);
    const diasLabel = dias < 0 ? `Venció hace ${Math.abs(dias)} días` : dias === 0 ? 'Vence hoy' : `${dias} días`;
    return `<div class="pending-item">
      <div class="pending-dot" style="background:${color}"></div>
      <div class="pending-info">
        <div class="pending-title">${o.nombre}</div>
        <div class="pending-client">${c?.nombre || '—'} · ${o.estatus.replace('_',' ')}</div>
      </div>
      <div class="pending-date">${diasLabel}</div>
    </div>`;
  }).join('');
}
